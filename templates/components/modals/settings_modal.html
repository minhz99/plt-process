<div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content text-bg-dark">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-gear"></i> Cài đặt Ngưỡng Đánh Giá</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Ngưỡng THD Điện áp (%) Cảnh báo</label>
          <input type="number" class="form-control bg-dark text-white border-secondary" id="set-thdv-warn" value="5">
        </div>
        <div class="mb-3">
          <label class="form-label">Ngưỡng THD Dòng điện (%) Cảnh báo</label>
          <input type="number" class="form-control bg-dark text-white border-secondary" id="set-thda-warn" value="15">
        </div>
        <div class="mb-3">
          <label class="form-label">Ngưỡng Mất cân bằng Điện áp (%) Cảnh báo</label>
          <input type="number" class="form-control bg-dark text-white border-secondary" id="set-vunb-warn" value="2">
        </div>
        <div class="mb-3">
          <label class="form-label">Hệ số cos(φ) tối thiểu</label>
          <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="set-pf-min" value="0.9">
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button type="button" class="btn btn-primary" onclick="saveSettings()" data-bs-dismiss="modal">Lưu cài đặt</button>
      </div>
    </div>
  </div>
</div>
