<script>

/* ── GLOBAL TOOL SWITCHING ── */
function switchTool(toolId) {
    const allowedTools = ['kew', 'img', 'excel'];
    const activeTool = allowedTools.includes(toolId) ? toolId : 'kew';

    document.querySelectorAll('.workspace').forEach(el => { 
        el.style.display = 'none';
        el.classList.remove('active');
    });
    document.querySelectorAll('#tool-tabs .tool-tab').forEach(el => el.classList.remove('active'));

    const workspace = document.getElementById('workspace-' + activeTool);
    if (workspace) {
        workspace.style.display = 'block';
        workspace.classList.add('active');
        console.log('Switched to workspace:', activeTool);
    } else {
        console.error('Workspace not found:', 'workspace-' + activeTool);
    }

    const btn = document.getElementById('btn-tool-' + activeTool);
    if (btn) btn.classList.add('active');

    const showKewMeta = activeTool === 'kew';
    const deviceInfo = document.getElementById('deviceInfo');
    const headerMeta = document.getElementById('headerMeta');
    if (deviceInfo) deviceInfo.style.display = showKewMeta ? 'block' : 'none';
    if (headerMeta) headerMeta.style.display = showKewMeta ? 'block' : 'none';

    localStorage.setItem('plt_active_tool', activeTool);
}

/* ── THEME SWITCHING ── */
function toggleTheme() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-bs-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    
    setTheme(newTheme);
}

function setTheme(theme) {
    const html = document.documentElement;
    html.setAttribute('data-bs-theme', theme);
    localStorage.setItem('plt_theme', theme);
    
    // Update UI elements
    const iconLight = document.getElementById('theme-icon-light');
    const iconDark = document.getElementById('theme-icon-dark');
    const themeText = document.getElementById('theme-text');
    
    if (theme === 'light') {
        if(iconLight) iconLight.classList.add('d-none');
        if(iconDark) iconDark.classList.remove('d-none');
        if(themeText) themeText.innerText = 'Chế độ tối';
    } else {
        if(iconLight) iconLight.classList.remove('d-none');
        if(iconDark) iconDark.classList.add('d-none');
        if(themeText) themeText.innerText = 'Chế độ sáng';
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('plt_theme') || 'dark';
    setTheme(savedTheme);
    const savedTool = localStorage.getItem('plt_active_tool') || 'kew';
    switchTool(savedTool);
});
</script>
